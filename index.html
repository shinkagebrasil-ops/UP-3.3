<script>
// SHIN KAGE CRIPTO v2 - REVISADO E PADRONIZADO PARA OPERAÇÕES REAIS
// Topologia Estrela • Múltiplos operadores • Broadcasting de status • Host ouve todos

let skPeer = null;
let skConnections = [];
let skActiveCalls = new Map();
let skLocalStream = null;
let skLocalAudioTrack = null;
let skAudioContext = null;
let skIsTransmitting = false;
let skIsOnline = false;
let skIsHost = false;
let skMyCodename = localStorage.getItem('sk_codename') || '';
let skConnectedOperators = [];
let skCurrentlySpeaking = null;
let skRemoteAudios = new Map();
let skSelectedMicDeviceId = null;
let skSelectedSpeakerDeviceId = null;
let skAudioDevices = { input: [], output: [] };
let skWakeLock = null;
let skReconnectAttempts = 0;
let skPttTouchId = null;

const powerBtn = document.getElementById('power-btn');
const powerIcon = document.getElementById('power-icon');
const powerLabel = document.getElementById('power-label');
const pttBtn = document.getElementById('ptt-btn');
const pttSound = document.getElementById('ptt-sound');
const pttIcon = document.getElementById('ptt-icon');
const pttLabel = document.getElementById('ptt-label');
const pttSub = document.getElementById('ptt-sub');
const statusPill = document.getElementById('status-pill');
const pillText = document.getElementById('pill-text');
const connStatus = document.getElementById('conn-status');
const canalCard = document.getElementById('canal-card');
const canalCode = document.getElementById('canal-code');
const canalMode = document.getElementById('canal-mode');
const opsNum = document.getElementById('ops-num');
const opsChips = document.getElementById('ops-chips');
const connectingRing = document.getElementById('connecting-ring');

function skPlayChirp(type = 'start') {
    try {
        if (!skAudioContext) skAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (skAudioContext.state === 'suspended') skAudioContext.resume();
        const o = skAudioContext.createOscillator();
        const g = skAudioContext.createGain();
        o.type = type === 'start' ? 'sawtooth' : 'sine';
        const t = skAudioContext.currentTime;
        if (type === 'start') {
            o.frequency.setValueAtTime(1220, t); o.frequency.linearRampToValueAtTime(680, t + .07);
            g.gain.setValueAtTime(.22, t); g.gain.linearRampToValueAtTime(.001, t + .09);
        } else {
            o.frequency.setValueAtTime(680, t); o.frequency.linearRampToValueAtTime(1100, t + .1);
            g.gain.setValueAtTime(.18, t); g.gain.linearRampToValueAtTime(.001, t + .12);
        }
        o.connect(g); g.connect(skAudioContext.destination);
        o.start(t); o.stop(t + .15);
    } catch(e){}
}

function skShowNotif(msg, color = '#166534') {
    document.querySelectorAll('.notif').forEach(n => n.remove());
    const el = document.createElement('div');
    el.className = 'notif';
    el.style.background = color;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2400);
}

function skCreateModal(innerHTML) {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `<div class="modal-box">${innerHTML}</div>`;
    bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
    document.body.appendChild(bg);
    return bg;
}

function skBroadcast(data) {
    const json = JSON.stringify(data);
    skConnections.forEach(c => { if (c && c.open) { try { c.send(json); } catch(e){} } });
}

function skBroadcastExcept(exceptConn, data) {
    const json = JSON.stringify(data);
    skConnections.forEach(c => { if (c && c.open && c !== exceptConn) { try { c.send(json); } catch(e){} } });
}

function skSyncOperatorsTo(conn) {
    if (!skIsHost || !conn || !conn.open) return;
    const list = skConnectedOperators.map(o => o.codename);
    conn.send(JSON.stringify({ type: 'sync_operators', operators: list }));
}

function skHandleMsg(data, fromConn = null) {
    try {
        const msg = typeof data === 'string' ? JSON.parse(data) : data;
        if (msg.type === 'identify') {
            if (!skConnectedOperators.find(o => o.codename === msg.codename)) {
                skConnectedOperators.push({ codename: msg.codename, isMe: false });
                skUpdateOpsUI();
                skShowNotif(`${msg.codename} entrou no canal`);
                if (skIsHost) {
                    skSyncOperatorsTo(fromConn);
                    skBroadcastExcept(fromConn, { type: 'operator_joined', codename: msg.codename });
                }
            }
        }
        if (msg.type === 'sync_operators' && !skIsHost) {
            msg.operators.forEach(codename => {
                if (!skConnectedOperators.find(o => o.codename === codename) && codename !== skMyCodename) {
                    skConnectedOperators.push({ codename, isMe: false });
                }
            });
            skUpdateOpsUI();
        }
        if (msg.type === 'speaking') {
            skCurrentlySpeaking = msg.codename;
            skUpdateOpsUI();
            if (skIsHost && fromConn) skBroadcastExcept(fromConn, msg);
        }
        if (msg.type === 'stopped_speaking') {
            if (skCurrentlySpeaking === msg.codename) skCurrentlySpeaking = null;
            skUpdateOpsUI();
            if (skIsHost && fromConn) skBroadcastExcept(fromConn, msg);
        }
        if (msg.type === 'operator_joined' && !skIsHost) {
            if (!skConnectedOperators.find(o => o.codename === msg.codename)) {
                skConnectedOperators.push({ codename: msg.codename, isMe: false });
                skUpdateOpsUI();
            }
        }
    } catch(e){}
}

function skUpdateOpsUI() {
    const all = skConnectedOperators;
    opsNum.textContent = all.length;
    opsChips.innerHTML = all.map(op => {
        let cls = op.isMe ? 'op-chip me' : 'op-chip peer';
        if (skCurrentlySpeaking === op.codename) cls = 'op-chip talking';
        return `<span class="${cls}">${op.codename}</span>`;
    }).join('');
    const mode = canalMode.textContent;
    if (!mode.includes('Aguardando') && all.length > 1) canalMode.textContent = canalMode.textContent.replace('Aguardando operadores...','');
}

function skUpdateUIOnline() {
    skIsOnline = true;
    powerBtn.classList.replace('off', 'on');
    powerIcon.className = 'fa-solid fa-check-circle power-icon';
    powerLabel.textContent = 'DESLIGAR';
    statusPill.classList.add('online');
    pillText.textContent = 'ONLINE';
    pttBtn.disabled = false;
    powerBtn.disabled = false;
}

function skUpdateUIOffline() {
    skIsOnline = false;
    powerBtn.classList.replace('on', 'off');
    powerIcon.className = 'fa-solid fa-power-off power-icon';
    powerLabel.textContent = 'LIGAR';
    statusPill.classList.remove('online');
    pillText.textContent = 'OFFLINE';
    pttBtn.disabled = true;
    pttBtn.classList.remove('transmitting');
    pttIcon.className = 'fa-solid fa-microphone ptt-icon';
    pttLabel.textContent = 'PTT'; pttLabel.style.color = '';
    pttSub.textContent = 'SEGURE E FALE'; pttSub.style.color = '';
    canalCard.style.display = 'none';
    connStatus.textContent = 'Toque em Ligar para conectar';
    connectingRing.style.display = 'none';
    powerBtn.disabled = false;
}

async function skAcquireAudioStream(deviceId = null) {
    if (skLocalStream) { skLocalStream.getTracks().forEach(t => t.stop()); skLocalStream = null; skLocalAudioTrack = null; }
    try {
        const constraints = { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 48000, channelCount: 1, ...(deviceId && { deviceId: { exact: deviceId } }) } };
        skLocalStream = await navigator.mediaDevices.getUserMedia(constraints);
        skLocalAudioTrack = skLocalStream.getAudioTracks()[0];
        if (skLocalAudioTrack) skLocalAudioTrack.enabled = false;
        return true;
    } catch(e) {
        skShowNotif('Microfone bloqueado. Verifique permissões.', '#991b1b');
        connectingRing.style.display = 'none';
        return false;
    }
}

async function skConnectCreate() {
    if (!await skAcquireAudioStream(skSelectedMicDeviceId)) return;
    const shortCode = Math.floor(1000 + Math.random() * 9000).toString();
    connStatus.textContent = 'Criando canal seguro...';
    skIsHost = true;
    skPeer = new Peer(`shin-kage-${shortCode}`);

    skPeer.on('open', () => {
        connectingRing.style.display = 'none';
        canalCode.textContent = shortCode;
        canalMode.textContent = 'Modo Internet • Host (Líder/TOC)';
        canalCard.style.display = 'block';
        connStatus.innerHTML = `Host do canal <strong>${shortCode}</strong> • Compartilhe o código`;
        skConnectedOperators = [{ codename: skMyCodename, isMe: true }];
        skUpdateOpsUI();
        skUpdateUIOnline();
        skShowNotif(`Canal ${shortCode} criado! Host ativo.`);
    });

    skPeer.on('connection', incomingConn => {
        skConnections.push(incomingConn);
        incomingConn.on('open', () => {
            incomingConn.send(JSON.stringify({ type: 'identify', codename: skMyCodename }));
            skSyncOperatorsTo(incomingConn);
        });
        incomingConn.on('data', (data) => skHandleMsg(data, incomingConn));
        incomingConn.on('close', () => { skConnections = skConnections.filter(c => c !== incomingConn); skUpdateOpsUI(); });
    });

    skPeer.on('call', call => {
        if (skLocalStream) {
            call.answer(skLocalStream);
            skActiveCalls.set(call.peer, call);
            skSetupCallEvents(call);
        }
    });
    skPeer.on('error', (err) => { skShowNotif('Erro na conexão PeerJS', '#991b1b'); console.error('[SHIN KAGE]', err); connectingRing.style.display = 'none'; });
}

async function skConnectJoin() {
    const shortCode = await skAskChannelCode();
    if (!shortCode) { 
        connectingRing.style.display = 'none'; 
        powerBtn.disabled = false;
        return; 
    }

    // CORRIGIDO: Pede NOME LIVRE (Bruno, Paula, José...) em vez de número
    const joinerName = await skAskJoinerName();
    skMyCodename = joinerName || 'Operador';

    if (!await skAcquireAudioStream(skSelectedMicDeviceId)) {
        powerBtn.disabled = false;
        return;
    }
    connStatus.textContent = `Conectando ao canal ${shortCode}...`;
    skIsHost = false;
    skPeer = new Peer();

    skPeer.on('open', () => {
        const targetId = `shin-kage-${shortCode}`;
        const dataConn = skPeer.connect(targetId, { reliable: true });
        skConnections.push(dataConn);
        dataConn.on('open', () => {
            canalCode.textContent = shortCode;
            canalMode.textContent = 'Modo Internet • Operador';
            canalCard.style.display = 'block';
            dataConn.send(JSON.stringify({ type: 'identify', codename: skMyCodename }));
            connStatus.innerHTML = `Conectado no canal <strong>${shortCode}</strong> • Codinome: <strong>${skMyCodename}</strong>`;
            skConnectedOperators = [{ codename: skMyCodename, isMe: true }];
            skUpdateOpsUI();
            skUpdateUIOnline();
            skRequestWakeLock();
            skShowNotif(`Conectado ao canal ${shortCode}!`);
            connectingRing.style.display = 'none';
            setTimeout(() => {
                if (skLocalStream && skPeer) {
                    try {
                        const mediaCall = skPeer.call(targetId, skLocalStream);
                        skActiveCalls.set(targetId, mediaCall);
                        skSetupCallEvents(mediaCall);
                    } catch(e){}
                }
            }, 450);
        });
        dataConn.on('data', (data) => skHandleMsg(data, dataConn));
        dataConn.on('close', () => skAttemptReconnect());
    });

    skPeer.on('call', call => {
        if (skLocalStream) {
            call.answer(skLocalStream);
            skActiveCalls.set(call.peer, call);
            skSetupCallEvents(call);
        }
    });
    skPeer.on('error', (err) => { 
        connStatus.textContent = 'Erro ao conectar no canal.'; 
        skShowNotif('Falha na conexão', '#991b1b'); 
        connectingRing.style.display = 'none'; 
        powerBtn.disabled = false;
        skIsOnline = false;
        console.error('[SHIN KAGE] Erro no join:', err);
    });
}

function skSetupCallEvents(call) {
    call.on('stream', remoteStream => {
        let audioEl = skRemoteAudios.get(call.peer);
        if (!audioEl) {
            audioEl = document.createElement('audio');
            audioEl.autoplay = true;
            audioEl.style.display = 'none';
            document.body.appendChild(audioEl);
            skRemoteAudios.set(call.peer, audioEl);
        }
        audioEl.srcObject = remoteStream;
        if (skSelectedSpeakerDeviceId && typeof audioEl.setSinkId === 'function') {
            audioEl.setSinkId(skSelectedSpeakerDeviceId).catch(() => {});
        }
    });
    call.on('close', () => {
        const el = skRemoteAudios.get(call.peer);
        if (el) { el.remove(); skRemoteAudios.delete(call.peer); }
        skActiveCalls.delete(call.peer);
    });
}

async function startPTT(e) {
    if (e) e.preventDefault();
    if (!skIsOnline || skIsTransmitting) return;
    if (e?.type === 'touchstart') { if (skPttTouchId !== null) return; skPttTouchId = e.changedTouches[0].identifier; }
    if (!skLocalStream || !skLocalAudioTrack || skLocalAudioTrack.readyState === 'ended') {
        if (!await skAcquireAudioStream(skSelectedMicDeviceId)) return;
    }
    skIsTransmitting = true;
    if (skLocalAudioTrack) skLocalAudioTrack.enabled = true;
    skCurrentlySpeaking = skMyCodename;
    pttBtn.classList.add('transmitting');
    pttIcon.className = 'fa-solid fa-broadcast-tower ptt-icon';
    pttLabel.textContent = 'TX'; pttLabel.style.color = '#4ade80';
    pttSub.textContent = 'TRANSMITINDO • E2E'; pttSub.style.color = '#4ade80';
    const speakingMsg = { type: 'speaking', codename: skMyCodename, timestamp: Date.now() };
    if (skIsHost) { skBroadcast(speakingMsg); } else if (skConnections.length > 0 && skConnections[0].open) { skConnections[0].send(JSON.stringify(speakingMsg)); }
    skUpdateOpsUI();
    if (pttSound) { try { pttSound.currentTime = 0; pttSound.play().catch(()=>{}); } catch(e){} }
    skPlayChirp('start');
}

function stopPTT(e) {
    if (e) e.preventDefault();
    if (e?.type === 'touchend' || e?.type === 'touchcancel') { const found = [...(e.changedTouches||[])].find(t => t.identifier === skPttTouchId); if (!found) return; skPttTouchId = null; }
    if (!skIsTransmitting) return;
    skIsTransmitting = false;
    if (skLocalAudioTrack) skLocalAudioTrack.enabled = false;
    skCurrentlySpeaking = null;
    pttBtn.classList.remove('transmitting');
    pttIcon.className = 'fa-solid fa-microphone ptt-icon';
    pttLabel.textContent = 'PTT'; pttLabel.style.color = '';
    pttSub.textContent = 'SEGURE E FALE'; pttSub.style.color = '';
    const stoppedMsg = { type: 'stopped_speaking', codename: skMyCodename };
    if (skIsHost) { skBroadcast(stoppedMsg); } else if (skConnections.length > 0 && skConnections[0].open) { skConnections[0].send(JSON.stringify(stoppedMsg)); }
    skUpdateOpsUI();
    skPlayChirp('end');
}

function skPlayNextelPTT() { /* já integrado no startPTT */ }

function skDisconnect() {
    skIsOnline = false;
    skReleaseWakeLock();
    skActiveCalls.forEach(call => { try { call.close(); } catch(e){} });
    skActiveCalls.clear();
    skConnections.forEach(c => { try { c.close(); } catch(e){} });
    skConnections = [];
    if (skPeer) { try { skPeer.destroy(); } catch(e){} }
    skPeer = null;
    skRemoteAudios.forEach(el => el.remove());
    skRemoteAudios.clear();
    if (skLocalStream) { skLocalStream.getTracks().forEach(t => t.stop()); skLocalStream = null; skLocalAudioTrack = null; }
    skConnectedOperators = [];
    skCurrentlySpeaking = null;
    skReconnectAttempts = 0;
    skIsHost = false;
    skUpdateUIOffline();
}

function skAttemptReconnect() {
    if (skReconnectAttempts >= 5 || !skIsOnline) return;
    skReconnectAttempts++;
    connStatus.textContent = `Reconectando... (${skReconnectAttempts}/5)`;
    setTimeout(() => { if (!skIsOnline) { if (skIsHost) skConnectCreate(); else skConnectJoin(); } }, Math.min(800 * skReconnectAttempts, 5000));
}

async function skRequestWakeLock() {
    if ('wakeLock' in navigator) { try { skWakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
}
function skReleaseWakeLock() { if (skWakeLock) { skWakeLock.release(); skWakeLock = null; } }

function skAskCodename() {
    return new Promise(resolve => {
        const saved = localStorage.getItem('sk_codename') || '';
        const m = skCreateModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="modal-title" style="margin:0;">SEU CODINOME TÁTICO</div><button class="modal-close" onclick="this.closest('.modal-bg').remove();"></button></div><div class="modal-sub">Identificação no canal. Será salvo automaticamente.</div><input class="modal-input" id="codename-inp" placeholder="Ex: ALPHA-01" maxlength="12" value="${saved}" autofocus><button class="modal-btn primary" id="codename-ok">CONFIRMAR</button>`);
        const inp = m.querySelector('#codename-inp');
        inp.focus(); inp.select();
        m.querySelector('#codename-ok').onclick = () => {
            const v = inp.value.trim() || 'Operador';
            localStorage.setItem('sk_codename', v);
            skMyCodename = v; m.remove(); resolve(v);
        };
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') m.querySelector('#codename-ok').click(); });
    });
}

function skShowModeChoice() {
    return new Promise(resolve => {
        const m = skCreateModal(`<div class="modal-title">MODO DE CONEXÃO</div><div class="modal-sub" style="margin-bottom:18px;">Escolha como deseja conectar</div><button class="modal-btn primary" id="mc-create"><i class="fa-solid fa-tower-broadcast"></i>&nbsp; CRIAR CANAL (você é o Host / Líder)</button><button class="modal-btn secondary" id="mc-join"><i class="fa-solid fa-right-to-bracket"></i>&nbsp; ENTRAR EM CANAL (código 4 dígitos)</button><button class="modal-btn danger" id="mc-cancel">Cancelar</button>`);
        m.querySelector('#mc-create').onclick = () => { m.remove(); resolve('create'); };
        m.querySelector('#mc-join').onclick = () => { m.remove(); resolve('join'); };
        m.querySelector('#mc-cancel').onclick = () => { m.remove(); resolve(null); };
    });
}

function skAskChannelCode() {
    return new Promise(resolve => {
        const m = skCreateModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="modal-title" style="margin:0;">CÓDIGO DO CANAL</div><button class="modal-close" onclick="this.closest('.modal-bg').remove();"></button></div><div class="modal-sub">Digite o código de 4 dígitos gerado pelo Host</div><input class="modal-input" id="code-inp" placeholder="0000" maxlength="4" inputmode="numeric" pattern="[0-9]*" autofocus style="font-size:28px;font-family:'Space Grotesk',sans-serif;letter-spacing:8px;text-align:center;"><button class="modal-btn primary" id="code-ok">CONECTAR</button><button class="modal-btn danger" onclick="this.closest('.modal-bg').remove();">Cancelar</button>`);
        const inp = m.querySelector('#code-inp');
        inp.focus();
        m.querySelector('#code-ok').onclick = () => {
            const v = inp.value.trim();
            if (v.length !== 4 || isNaN(v)) { inp.style.borderColor = '#ef4444'; inp.focus(); return; }
            m.remove(); resolve(v);
        };
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') m.querySelector('#code-ok').click(); });
        inp.addEventListener('input', () => { inp.style.borderColor = ''; if (inp.value.length === 4) m.querySelector('#code-ok').focus(); });
    });
}

// CORRIGIDO: Pede NOME LIVRE para o Joiner (Bruno, Paula, José, etc.)
function skAskJoinerName() {
    return new Promise(resolve => {
        const lastName = localStorage.getItem('sk_last_joiner_name') || '';
        const m = skCreateModal(`
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <div class="modal-title" style="margin:0;">SEU NOME / CODINOME</div>
                <button class="modal-close" onclick="this.closest('.modal-bg').remove();"></button>
            </div>
            <div class="modal-sub">Digite seu nome ou codinome tático (ex: Bruno, Paula, Líder Norte)</div>
            <input class="modal-input" id="joiner-name-inp" placeholder="Seu Nome" maxlength="16" value="${lastName}" autofocus style="font-size:20px;">
            <button class="modal-btn primary" id="joiner-name-ok">CONFIRMAR</button>
            <button class="modal-btn danger" onclick="this.closest('.modal-bg').remove();">Cancelar</button>
        `);
        const inp = m.querySelector('#joiner-name-inp');
        inp.focus();
        inp.select();

        m.querySelector('#joiner-name-ok').onclick = () => {

}

async function togglePower() {
    if (skIsOnline) { skDisconnect(); return; }
    if (!skMyCodename) skMyCodename = await skAskCodename();
    if (!skMyCodename) return;
    const mode = await skShowModeChoice();
    if (!mode) return;
    connectingRing.style.display = 'block';
    powerBtn.disabled = true;
    if (mode === 'create') await skConnectCreate();
    else if (mode === 'join') await skConnectJoin();
}

async function enumerateAudioDevices() {
    try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
        const devs = await navigator.mediaDevices.enumerateDevices();
        skAudioDevices.input = devs.filter(d => d.kind === 'audioinput');
        skAudioDevices.output = devs.filter(d => d.kind === 'audiooutput');
        return true;
    } catch(e) { return false; }
}

async function showAudioDeviceSelector() {
    await enumerateAudioDevices();
    if (!skAudioDevices.input.length) { skShowNotif('Nenhum dispositivo encontrado', '#991b1b'); return; }
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="modal-title" style="margin:0;">SELETOR DE ÁUDIO TÁTICO</div><button class="modal-close" onclick="this.closest('.modal-bg').remove();">×</button></div><div style="font-size:10px;color:#f59e0b;letter-spacing:2px;font-weight:700;margin-bottom:8px;">MICROFONE (INPUT)</div>`;
    skAudioDevices.input.forEach((dev, i) => {
        const isBT = /bluetooth|headset|fone|airpods|bose|jabra|sony|jbl/i.test(dev.label);
        const label = dev.label || `Microfone ${i+1}`;
        const sel = skSelectedMicDeviceId === dev.deviceId ? 'border-color:#4ade80;' : '';
        html += `<div onclick="selectDev('${dev.deviceId}','input',this)" style="padding:11px 14px;margin:5px 0;background:#18181b;border:1px solid #27272a;${sel}border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;"><i class="fa-solid ${isBT?'fa-headset':'fa-microphone'}" style="color:#4ade80;"></i><span style="flex:1;font-size:13px;">${label}</span>${isBT?'<span style="font-size:9px;background:#166534;color:#4ade80;padding:2px 7px;border-radius:4px;font-weight:700;">BT</span>':''}</div>`;
    });
    if (skAudioDevices.output.length) {
        html += `<div style="font-size:10px;color:#3b82f6;letter-spacing:2px;font-weight:700;margin:12px 0 8px;">ALTO-FALANTE (OUTPUT)</div>`;
        skAudioDevices.output.forEach((dev, i) => {
            const isBT = /bluetooth|headset|fone/i.test(dev.label);
            const label = dev.label || `Saída ${i+1}`;
            const sel = skSelectedSpeakerDeviceId === dev.deviceId ? 'border-color:#60a5fa;' : '';
            html += `<div onclick="selectDev('${dev.deviceId}','output',this)" style="padding:11px 14px;margin:5px 0;background:#18181b;border:1px solid #27272a;${sel}border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;"><i class="fa-solid ${isBT?'fa-headset':'fa-volume-up'}" style="color:#60a5fa;"></i><span style="flex:1;font-size:13px;">${label}</span>${isBT?'<span style="font-size:9px;background:#1e40af;color:#60a5fa;padding:2px 7px;border-radius:4px;font-weight:700;">BT</span>':''}</div>`;
        });
    } else {
        html += `<div style="font-size:12px;color:#52525b;padding:8px 0;">Saídas seguem o sistema automaticamente.</div>`;
    }
    html += `<div style="font-size:10px;color:#52525b;text-align:center;margin-top:12px;">Emparelhe o Bluetooth nas configurações do celular primeiro.</div>`;
    skCreateModal(html);
}

window.selectDev = function(deviceId, type, el) {
    if (type === 'input') {
        skSelectedMicDeviceId = deviceId;
        if (skIsOnline && skLocalStream) { skLocalStream.getTracks().forEach(t => t.stop()); skLocalStream = null; skLocalAudioTrack = null; }
    } else {
        skSelectedSpeakerDeviceId = deviceId;
        skRemoteAudios.forEach(audioEl => { if (audioEl && typeof audioEl.setSinkId === 'function') audioEl.setSinkId(deviceId).catch(() => {}); });
    }
    el.closest('.modal-bg').remove();
    skShowNotif(`${type === 'input' ? 'Microfone' : 'Saída'} selecionado(a)`);
};

function updateOfflineStatus() {
    const pill = document.getElementById('status-pill');
    const pillText = document.getElementById('pill-text');
    if (!pill || !pillText) return;

    if (!navigator.onLine) {
        pill.style.background = '#3f1f1f';
        pill.style.borderColor = '#991b1b';
        pillText.textContent = 'OFFLINE';
        pillText.style.color = '#ef4444';
    } else {
        // Restore based on connection state (simplified)
        if (pill.classList.contains('online')) {
            pill.style.background = '#052e16';
            pill.style.borderColor = '#166534';
            pillText.style.color = '#4ade80';
        }
    }
}
